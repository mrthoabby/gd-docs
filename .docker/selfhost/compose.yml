name: gddocs
services:
  gddocs:
    image: gddocs:latest
    container_name: gddocs_server
    ports:
      - '${PORT:-3010}:3010'
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      gddocs_migration:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      # Configuración personalizada del servidor
      - ${CONFIG_LOCATION}:/root/.affine/config
      # [SELFHOST PATCH] Assets estáticos descargados localmente (sin CDN en runtime)
      # Fuentes del editor (Edgeless canvas, PDF export, Typst renderer)
      # Nota: usar /root en el default (no ~) — Docker no expande ~ en defaults de compose.
      - ${ASSETS_LOCATION:-/root/.gddocs/static}/fonts:/app/static/fonts:ro
      # Imágenes de fondo para presentaciones AI
      - ${ASSETS_LOCATION:-/root/.gddocs/static}/ppt-images:/app/static/ppt-images:ro
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-gddocs}
      - AFFINE_INDEXER_ENABLED=false
    restart: unless-stopped

  gddocs_migration:
    image: gddocs:latest
    container_name: gddocs_migration
    volumes:
      # Configuración personalizada del servidor (read-only en migración — no debe modificarla)
      - ${CONFIG_LOCATION}:/root/.affine/config:ro
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-gddocs}
      - AFFINE_INDEXER_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        # Los buckets deben existir antes de que la migración inicialice el servidor
        condition: service_completed_successfully

  # ── MinIO: almacenamiento de objetos compatible con S3 ─────────
  # Reemplaza el almacenamiento en disco (fs) para blobs, avatares
  # e imágenes del copilot. Mucho más eficiente en espacio y permite
  # escalar horizontalmente sin tocar el filesystem del host.
  minio:
    image: minio/minio:latest
    container_name: gddocs_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${MINIO_DATA_LOCATION:-~/.gddocs/minio}:/data
    ports:
      # Consola web de administración MinIO (opcional, útil para inspeccionar buckets)
      - '9001:9001'
      # Puerto S3 (no se expone al exterior — solo red interna Docker)
    expose:
      - '9000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 20s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── minio-init: crea los buckets una sola vez al arrancar ──────
  # Este contenedor termina exit 0 cuando los buckets existen.
  # gddocs y gddocs_migration esperan a que este servicio termine OK.
  # restart: "no" es obligatorio — combinarlo con restart: on-failure
  # y --wait genera un bucle infinito donde Compose nunca detecta el fallo.
  minio-init:
    image: minio/mc:latest
    container_name: gddocs_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        RETRIES=0
        MAX=3
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" 2>&1; do
          RETRIES=$$((RETRIES + 1))
          if [ "$$RETRIES" -ge "$$MAX" ]; then
            echo "[ERROR] MinIO no disponible tras $$MAX intentos. Abortando."
            exit 1
          fi
          echo "[RETRY $$RETRIES/$$MAX] Reintentando en 5s..."
          sleep 5
        done
        echo "[OK] Conexión a MinIO establecida."
        mc mb --ignore-existing local/gddocs-blobs   && echo "[OK] bucket gddocs-blobs"
        mc mb --ignore-existing local/gddocs-avatars && echo "[OK] bucket gddocs-avatars"
        mc mb --ignore-existing local/gddocs-copilot && echo "[OK] bucket gddocs-copilot"
        echo "[OK] Buckets de MinIO listos."
    restart: "no"

  redis:
    image: redis
    container_name: gddocs_redis
    # Persistencia AOF: garantiza que las sesiones y datos de caché sobrevivan reinicios.
    # Sin esto, todos los usuarios quedan deslogueados cada vez que el contenedor se reinicia.
    # --requirepass: autenticación obligatoria para cualquier cliente en la red Docker.
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ${REDIS_DATA_LOCATION:-~/.gddocs/redis}:/data
    healthcheck:
      # -a pasa la contraseña al redis-cli del healthcheck
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: gddocs_postgres
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-gddocs}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # md5: requiere contraseña en todas las conexiones TCP (más seguro que 'trust')
      POSTGRES_HOST_AUTH_METHOD: md5
    healthcheck:
      test:
        ['CMD', 'pg_isready', '-U', "${DB_USERNAME}", '-d', "${DB_DATABASE:-gddocs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
