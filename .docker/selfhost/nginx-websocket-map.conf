# ============================================================
#  GD docs — Nginx WebSocket map
#
#  Este archivo va en el contexto http{} de Nginx, NO dentro
#  de un bloque server{}.
#
#  Instalación:
#    sudo cp nginx-websocket-map.conf /etc/nginx/conf.d/websocket-map.conf
#    sudo nginx -t && sudo systemctl reload nginx
#
#  Solo necesitás este archivo si nginx.conf global NO tiene ya
#  un bloque "map $http_upgrade $connection_upgrade { ... }".
# ============================================================

map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}
