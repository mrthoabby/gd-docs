# ============================================================
#  GD docs — Nginx Reverse Proxy
#
#  Instalación rápida en Ubuntu/Debian:
#    sudo apt install nginx certbot python3-certbot-nginx
#    sudo cp nginx.conf /etc/nginx/sites-available/gddocs
#    # Editá TU_DOMINIO abajo antes de continuar
#    sudo ln -s /etc/nginx/sites-available/gddocs /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#    sudo certbot --nginx -d TU_DOMINIO    # genera SSL automáticamente
#
#  Variables a reemplazar:
#    TU_DOMINIO   → tu dominio real  (ej: docs.miempresa.com)
#    3010         → el PORT de tu .env si lo cambiaste
# ============================================================

# ── Redirigir HTTP → HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name TU_DOMINIO;

    # Certbot usa este path para renovar certificados
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ──────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name TU_DOMINIO;

    # ── SSL (certbot los genera automáticamente) ─────────────
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Seguridad HTTP headers ───────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP: ajustá si usás fuentes/imágenes externas
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; worker-src 'self' blob:;" always;

    # ── Límites de upload ────────────────────────────────────
    # GD docs permite adjuntar archivos grandes; 200 MB cubre la mayoría de casos.
    # Ajustá junto a AFFINE_SERVER_STORAGE_LIMIT en tu .env si necesitás más.
    client_max_body_size 200M;

    # ── Compresión ───────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/wasm;
    gzip_min_length  1024;
    gzip_comp_level  5;
    gzip_vary        on;

    # ── Proxy base ───────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # WebSocket upgrade (colaboración en tiempo real)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Timeouts generosos — las requests de Copilot/AI pueden durar bastante
    proxy_connect_timeout   60s;
    proxy_send_timeout      300s;
    proxy_read_timeout      300s;

    # ── SSE / streaming de AI (no bufferizar) ────────────────
    # Las respuestas de Copilot se envían como Server-Sent Events;
    # si nginx las bufferiza el usuario ve la respuesta de golpe al final.
    location /api/worker/ {
        proxy_pass          http://127.0.0.1:3010;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  600s;  # streams largos de AI
    }

    # ── GraphQL subscriptions (WebSocket) ────────────────────
    location /graphql {
        proxy_pass          http://127.0.0.1:3010;
        proxy_buffering     off;
    }

    # ── WebSocket de colaboración ────────────────────────────
    location /socket.io/ {
        proxy_pass          http://127.0.0.1:3010;
        proxy_buffering     off;
    }

    # ── Assets estáticos: caché agresiva ────────────────────
    # El frontend usa hashes en los nombres de archivo; es seguro cachear un año.
    location ~* \.(js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico|wasm)$ {
        proxy_pass          http://127.0.0.1:3010;
        proxy_cache_valid   200 1y;
        add_header          Cache-Control "public, max-age=31536000, immutable";
        # Mantenemos los headers de seguridad también en assets
        add_header X-Content-Type-Options nosniff always;
    }

    # ── Todo lo demás ────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3010;
    }
}

# ── Mapa para el upgrade de WebSocket ───────────────────────
# (va a nivel http{}, no dentro de server{} — Nginx lo requiere así)
# Si ya tenés este map en nginx.conf global, borrá este bloque.
# ============================================================
# map $http_upgrade $connection_upgrade {
#     default   upgrade;
#     ''        close;
# }
# ============================================================
# NOTA: el bloque map de arriba debe ir en el contexto http{} de
# /etc/nginx/nginx.conf (o en un archivo include dentro de http{}).
# Creá /etc/nginx/conf.d/websocket-map.conf con ese contenido si
# no lo tenés ya.
